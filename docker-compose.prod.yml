services:
  gateway:
    build:
      context: ./services/gateway
    container_name: tripbuddy-gateway
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      GATEWAY_PORT: 4000
      IDENTITY_SERVICE_URL: http://identity-service:4001
      TRIP_SERVICE_URL: http://trip-service:4002
    depends_on:
      - identity-service
      - trip-service

  identity-service:
    build:
      context: ./services/identity-service
    container_name: tripbuddy-identity-service
    restart: unless-stopped
    environment:
      IDENTITY_SERVICE_PORT: 4001
      IDENTITY_DB_HOST: identity-db
      IDENTITY_DB_PORT: 5432
      IDENTITY_DB_NAME: ${IDENTITY_DB_NAME:-identity_db}
      IDENTITY_DB_USER: ${IDENTITY_DB_USER:-postgres}
      IDENTITY_DB_PASSWORD: ${IDENTITY_DB_PASSWORD:-postgres}
      IDENTITY_JWT_SECRET: ${IDENTITY_JWT_SECRET:-tripbuddy_identity_secret}
    depends_on:
      identity-db:
        condition: service_healthy

  trip-service:
    build:
      context: ./services/trip-service
    container_name: tripbuddy-trip-service
    restart: unless-stopped
    environment:
      TRIP_SERVICE_PORT: 4002
      TRIP_DB_HOST: trip-db
      TRIP_DB_PORT: 5432
      TRIP_DB_NAME: ${TRIP_DB_NAME:-trip_db}
      TRIP_DB_USER: ${TRIP_DB_USER:-postgres}
      TRIP_DB_PASSWORD: ${TRIP_DB_PASSWORD:-postgres}
      TRIP_JWT_SECRET: ${IDENTITY_JWT_SECRET:-tripbuddy_identity_secret}
    depends_on:
      trip-db:
        condition: service_healthy

  identity-db:
    image: postgres:16
    container_name: tripbuddy-identity-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${IDENTITY_DB_NAME:-identity_db}
      POSTGRES_USER: ${IDENTITY_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${IDENTITY_DB_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IDENTITY_DB_USER:-postgres} -d ${IDENTITY_DB_NAME:-identity_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - identity_db_data:/var/lib/postgresql/data

  trip-db:
    image: postgres:16
    container_name: tripbuddy-trip-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TRIP_DB_NAME:-trip_db}
      POSTGRES_USER: ${TRIP_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${TRIP_DB_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TRIP_DB_USER:-postgres} -d ${TRIP_DB_NAME:-trip_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - trip_db_data:/var/lib/postgresql/data

volumes:
  identity_db_data:
  trip_db_data:
